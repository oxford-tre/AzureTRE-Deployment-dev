---
name: Export Repository Secrets To Azure

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to load secrets from
        type: environment
        required: true
      storage_container:
        description: Blob container that stores export files
        type: string
        default: secret-exports
        required: true

permissions:
  contents: read

concurrency: "${{ github.workflow }}-${{ github.ref }}"

jobs:
  export-secrets:
    name: Export known secrets
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      AAD_TENANT_ID: ${{ secrets.AAD_TENANT_ID }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      API_CLIENT_ID: ${{ secrets.API_CLIENT_ID }}
      API_CLIENT_SECRET: ${{ secrets.API_CLIENT_SECRET }}
      APPLICATION_ADMIN_CLIENT_ID: ${{ secrets.APPLICATION_ADMIN_CLIENT_ID }}
      APPLICATION_ADMIN_CLIENT_SECRET: ${{ secrets.APPLICATION_ADMIN_CLIENT_SECRET }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_ENVIRONMENT: ${{ secrets.AZURE_ENVIRONMENT }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      CI_CACHE_ACR_NAME: ${{ secrets.CI_CACHE_ACR_NAME }}
      ENCRYPTION_KV_NAME: ${{ secrets.ENCRYPTION_KV_NAME }}
      EXTERNAL_KEY_STORE_ID: ${{ secrets.EXTERNAL_KEY_STORE_ID }}
      MGMT_RESOURCE_GROUP_NAME: ${{ secrets.MGMT_RESOURCE_GROUP_NAME }}
      MGMT_STORAGE_ACCOUNT_NAME: ${{ secrets.MGMT_STORAGE_ACCOUNT_NAME }}
      PRIVATE_AGENT_SUBNET_ID: ${{ secrets.PRIVATE_AGENT_SUBNET_ID }}
      SWAGGER_UI_CLIENT_ID: ${{ secrets.SWAGGER_UI_CLIENT_ID }}
      TEST_ACCOUNT_CLIENT_ID: ${{ secrets.TEST_ACCOUNT_CLIENT_ID }}
      TEST_ACCOUNT_CLIENT_SECRET: ${{ secrets.TEST_ACCOUNT_CLIENT_SECRET }}
      TRE_ID: ${{ secrets.TRE_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required export settings
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AZURE_CREDENTIALS}" ]; then
            echo "AZURE_CREDENTIALS is required."
            exit 1
          fi
          if [ -z "${MGMT_STORAGE_ACCOUNT_NAME}" ]; then
            echo "MGMT_STORAGE_ACCOUNT_NAME is required."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ (secrets.AZURE_ENVIRONMENT != '' && secrets.AZURE_ENVIRONMENT) || 'AzureCloud' }}

      - name: Generate secrets export file
        shell: bash
        env:
          WORKFLOW_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          export_path="repo-secrets-${{ github.event.inputs.environment }}-${{ github.run_id }}.json"
          export EXPORT_PATH="${export_path}"

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          keys = [
              "AAD_TENANT_ID",
              "ACR_NAME",
              "API_CLIENT_ID",
              "API_CLIENT_SECRET",
              "APPLICATION_ADMIN_CLIENT_ID",
              "APPLICATION_ADMIN_CLIENT_SECRET",
              "AZURE_CREDENTIALS",
              "AZURE_ENVIRONMENT",
              "AZURE_SUBSCRIPTION_ID",
              "CI_CACHE_ACR_NAME",
              "ENCRYPTION_KV_NAME",
              "EXTERNAL_KEY_STORE_ID",
              "MGMT_RESOURCE_GROUP_NAME",
              "MGMT_STORAGE_ACCOUNT_NAME",
              "PRIVATE_AGENT_SUBNET_ID",
              "SWAGGER_UI_CLIENT_ID",
              "TEST_ACCOUNT_CLIENT_ID",
              "TEST_ACCOUNT_CLIENT_SECRET",
              "TRE_ID",
          ]

          payload = {
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "environment": os.environ.get("WORKFLOW_ENVIRONMENT"),
              "generated_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "secrets": {key: os.environ.get(key, "") for key in keys},
          }

          with open(os.environ["EXPORT_PATH"], "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, sort_keys=True)
          PY

          echo "EXPORT_PATH=${export_path}" >> "${GITHUB_ENV}"
          chmod 600 "${export_path}"

      - name: Upload export file to Azure Blob
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${AZURE_SUBSCRIPTION_ID}" ]; then
            az account set --subscription "${AZURE_SUBSCRIPTION_ID}"
          fi

          ip_rule_added="false"
          runner_public_ip=""
          original_default_action=""
          default_action_changed="false"
          ensure_default_action_allow() {
            if [ -z "${MGMT_RESOURCE_GROUP_NAME}" ]; then
              return 1
            fi

            if [ "${default_action_changed}" = "true" ]; then
              return 0
            fi

            if [ -z "${original_default_action}" ]; then
              original_default_action="$(az storage account show \
                --resource-group "${MGMT_RESOURCE_GROUP_NAME}" \
                --name "${MGMT_STORAGE_ACCOUNT_NAME}" \
                --query "networkRuleSet.defaultAction" \
                --output tsv)"
            fi

            if [ "${original_default_action}" = "Allow" ]; then
              return 0
            fi

            set +e
            default_action_update_output="$(az storage account update \
              --resource-group "${MGMT_RESOURCE_GROUP_NAME}" \
              --name "${MGMT_STORAGE_ACCOUNT_NAME}" \
              --default-action Allow \
              2>&1 1>/dev/null)"
            default_action_update_exit_code=$?
            set -e

            if [ "${default_action_update_exit_code}" -ne 0 ]; then
              echo "${default_action_update_output}"
              return 1
            fi

            default_action_changed="true"
            # Allow time for storage firewall rule propagation.
            sleep 25
            return 0
          }

          cleanup_network_rule() {
            if [ "${default_action_changed}" = "true" ] && [ -n "${original_default_action}" ]; then
              az storage account update \
                --resource-group "${MGMT_RESOURCE_GROUP_NAME}" \
                --name "${MGMT_STORAGE_ACCOUNT_NAME}" \
                --default-action "${original_default_action}" \
                1>/dev/null || true
            fi
            if [ "${ip_rule_added}" = "true" ]; then
              az storage account network-rule remove \
                --resource-group "${MGMT_RESOURCE_GROUP_NAME}" \
                --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
                --ip-address "${runner_public_ip}" \
                1>/dev/null || true
            fi
          }
          trap cleanup_network_rule EXIT

          if [ -n "${MGMT_RESOURCE_GROUP_NAME}" ]; then
            runner_public_ip="$(curl -fsSL "https://api.ipify.org" || curl -fsSL "https://ifconfig.me" || true)"
            if [ -n "${runner_public_ip}" ]; then
              set +e
              ip_rule_add_output="$(az storage account network-rule add \
                --resource-group "${MGMT_RESOURCE_GROUP_NAME}" \
                --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
                --ip-address "${runner_public_ip}" \
                2>&1 1>/dev/null)"
              ip_rule_add_exit_code=$?
              set -e
              if [ "${ip_rule_add_exit_code}" -eq 0 ]; then
                ip_rule_added="true"
                # Allow time for storage firewall rule propagation.
                sleep 20
              else
                echo "Warning: could not add temporary IP rule; continuing with fallback."
                echo "${ip_rule_add_output}"
              fi
            fi
          fi

          set +e
          container_exists="$(az storage container exists \
            --name "${{ github.event.inputs.storage_container }}" \
            --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
            --auth-mode login \
            --query exists \
            --output tsv 2>&1)"
          exists_exit_code=$?
          set -e

          if [ "${exists_exit_code}" -ne 0 ]; then
            if [[ "${container_exists}" == *"blocked by network rules"* ]] && [ -n "${MGMT_RESOURCE_GROUP_NAME}" ]; then
              ensure_default_action_allow
              container_exists="$(az storage container exists \
                --name "${{ github.event.inputs.storage_container }}" \
                --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
                --auth-mode login \
                --query exists \
                --output tsv)"
            else
              echo "${container_exists}"
              exit "${exists_exit_code}"
            fi
          fi

          if [ "${container_exists}" != "true" ]; then
            az storage container create \
              --name "${{ github.event.inputs.storage_container }}" \
              --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
              --auth-mode login \
              --public-access off \
              1>/dev/null
          fi

          set +e
          blob_upload_output="$(az storage blob upload \
            --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
            --container-name "${{ github.event.inputs.storage_container }}" \
            --name "${EXPORT_PATH}" \
            --file "${EXPORT_PATH}" \
            --auth-mode login \
            --overwrite true \
            2>&1 1>/dev/null)"
          blob_upload_exit_code=$?
          set -e

          if [ "${blob_upload_exit_code}" -ne 0 ]; then
            if [[ "${blob_upload_output}" == *"blocked by network rules"* ]] && [ -n "${MGMT_RESOURCE_GROUP_NAME}" ]; then
              ensure_default_action_allow
              az storage blob upload \
                --account-name "${MGMT_STORAGE_ACCOUNT_NAME}" \
                --container-name "${{ github.event.inputs.storage_container }}" \
                --name "${EXPORT_PATH}" \
                --file "${EXPORT_PATH}" \
                --auth-mode login \
                --overwrite true \
                1>/dev/null
            else
              echo "${blob_upload_output}"
              exit "${blob_upload_exit_code}"
            fi
          fi

          echo "Export uploaded to https://${MGMT_STORAGE_ACCOUNT_NAME}.blob.core.windows.net/${{ github.event.inputs.storage_container }}/${EXPORT_PATH}"

      - name: Remove local export file
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${EXPORT_PATH:-}"
