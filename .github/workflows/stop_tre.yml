name: Stop Azure TRE

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: The Github Actions environment to use
        type: environment
        default: CICD
        required: true

concurrency: "tre-stop-${{ github.ref }}"

jobs:
  stop_tre:
    name: Stop TRE
    runs-on: ubuntu-latest
    environment: ${{ inputs.environmentName }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT || 'AzureCloud' }}

      - name: Show Azure context
        run: |
          az account show
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID || '' }}" || true

      - name: Stop TRE
        env:
          TRE_ID: ${{ secrets.TRE_ID }}
          LOCATION: ${{ vars.LOCATION }}
        run: |
          make tre-stop
